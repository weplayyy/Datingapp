name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Debug Java
        run: |
          echo $JAVA_HOME
          java -version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Fix problematic PNGs
        run: |
          sudo apt-get update || true
          sudo apt-get install -y imagemagick || true
          # Find all PNGs and re-process them with convert to remove metadata and fix chunks
          find android/app/src/main/res -name "*.png" | while read -r img; do
            echo "Processing $img"
            convert "$img" -strip -define png:include-chunk=none "$img" || true
          done

      - name: Fix Gradle Wrapper
        run: |
          cd android
          # Download a fresh wrapper jar if the current one is corrupt
          wget -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew clean

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Sign APK
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
        if: ${{ env.ANDROID_SIGNING_KEY != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: charm-android-builds
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
